<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024">
  <!-- Homer app icon: an open book — the story of a PR, told. A bookmark
       ribbon marks your place along the guided read. -->
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#7c5cff"/>
      <stop offset="1" stop-color="#5b3ee0"/>
    </linearGradient>
    <linearGradient id="page" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#eae6ff"/>
    </linearGradient>
  </defs>

  <!-- macOS-style rounded tile -->
  <rect x="0" y="0" width="1024" height="1024" rx="229" ry="229" fill="url(#bg)"/>

  <!-- left page -->
  <path fill="url(#page)"
        d="M512 356
           C 452 316, 372 300, 276 306
           C 250 308, 232 328, 232 354
           L 232 686
           C 232 710, 252 728, 276 726
           C 366 720, 452 736, 512 774 Z"/>
  <!-- right page -->
  <path fill="url(#page)"
        d="M512 356
           C 572 316, 652 300, 748 306
           C 774 308, 792 328, 792 354
           L 792 686
           C 792 710, 772 728, 748 726
           C 658 720, 572 736, 512 774 Z"/>

  <!-- spine shadow -->
  <path fill="#c9c0f5" fill-opacity="0.9"
        d="M504 360 h16 v410 h-16 z"/>

  <!-- text lines (the story) -->
  <g stroke="#8b7be0" stroke-width="20" stroke-linecap="round" opacity="0.85">
    <line x1="300" y1="410" x2="452" y2="422"/>
    <line x1="300" y1="470" x2="452" y2="482"/>
    <line x1="300" y1="530" x2="452" y2="542"/>
    <line x1="572" y1="422" x2="724" y2="410"/>
    <line x1="572" y1="482" x2="724" y2="470"/>
    <line x1="572" y1="542" x2="724" y2="530"/>
  </g>

  <!-- bookmark ribbon marking your place -->
  <path fill="#ff9a6b"
        d="M636 306 h96 v190 l-48 -44 -48 44 Z"/>
</svg>
